about_h1=Ексклузив Сервиз
about_h3=Вашият доверен партньор за ремонт на автомобили
about_history=Нашата история
about_history_p=Сервизът беше създаден през Септември 2016 година и от тогава ние активно се занимаваме с боядисване и възстановяване на автомобили. През 2023 година бе преименуван и ребрандиран, като се утвърди като лидер в индустрията за висококачествено обслужване на автомобили. Сервизът работи с най-добрите материали и техника, за да предоставя безкомпромисно качество.
about_mission=Нашата мисия
about_mission_p=Ние сме ангажирани да предоставяме най-доброто обслужване за нашите клиенти, като се стремим да постигнем съвършенство във всяка услуга, която предоставяме. Работим с най-добрите продукти и технологии, за да осигурим дългосрочни и надеждни резултати за всяко превозно средство.
about_vision=Нашата визия
about_vision_p=Нашата визия е да бъдем водещ сервиз за автомобилно боядисване и възстановяване в страната, като предоставяме безкомпромисно качество и обслужване на най-високо ниво за всички автомобили - от стандартни до луксозни марки.
about_team=Нашият екип
about_team_p=Екипът на Ексклузив Сервиз се състои от висококвалифицирани професионалисти, които са преминали през редица специализирани обучения, включително с продукти на 3M и R-M. Всеки от нашите специалисти е истински експерт в своята област, като предоставя индивидуално внимание и внимание към детайлите. Работим със стотици автомобили всяка година, включително луксозни марки като Ferrari, Lamborghini, Porsche и други.
about_partners=Нашите партньори
about_partners_p=Ексклузив Сервиз е доверен партньор на застрахователната компания "Асет Иншурънс". Със своето безкомпромисно качество и професионализъм, ние сме избрани за сертифициран сервиз, който предлага висококачествени ремонти и възстановяване на автомобили за всички наши клиенти, работещи с тази застрахователна компания.
