<!DOCTYPE html>
<html lang="en" xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/commons::head}"></head>
<body>
<header th:replace="~{fragments/commons::nav}"></header>
<main>
    <form id="uploadForm" enctype="multipart/form-data">
        <input type="file" id="imageFile" name="image">
        <input type="text" id="imageTitle" name="title" placeholder="Въведете име">
        <button type="submit">Качи</button>
    </form>

    <div id="gallery">
        <!-- Тук ще се визуализират качените снимки -->
    </div>

    <script>
        document.getElementById("uploadForm").addEventListener("submit", function(event) {
            event.preventDefault();

            let formData = new FormData();
            formData.append("image", document.getElementById("imageFile").files[0]);
            formData.append("title", document.getElementById("imageTitle").value);

            fetch("/admin/gallery/upload", {
                method: "POST",
                body: formData
            })
                .then(response => response.text())
                .then(data => {
                    alert(data);
                    location.reload(); // Презареждане за да се обнови галерията
                })
                .catch(error => console.error("Грешка:", error));
        });

        // Изтриване на снимка
        function deleteImage(id) {
            fetch(`/admin/gallery/delete/${id}`, {
                method: "DELETE"
            })
                .then(response => response.text())
                .then(data => {
                    alert(data);
                    location.reload();
                });
        }
    </script>

</main>
<footer th:replace="~{fragments/commons::footer}"></footer>
</body>
</html>
